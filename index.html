<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantilla de Inversiones</title>
    <meta name="description" content="Estamos trabajando en algo increíble. Próximamente lanzaremos.">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        bg: {
                            DEFAULT: '#EFF4EF', // Sage Green Tint Base
                        },
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#64748B', // Slate Blue
                            600: '#475569',
                            900: '#0f172a',
                        },
                        sage: {
                            100: '#E0E5E0',
                            500: '#84A59D',
                            600: '#6B8E86',
                        }
                    },
                    boxShadow: {
                        'neu-flat': '9px 9px 16px #cbd1cb, -9px -9px 16px #ffffff',
                        'neu-pressed': 'inset 6px 6px 10px #cbd1cb, inset -6px -6px 10px #ffffff',
                        'neu-float': '14px 14px 24px #cbd1cb, -14px -14px 24px #ffffff',
                        'neu-icon': '5px 5px 10px #cbd1cb, -5px -5px 10px #ffffff',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #EFF4EF;
            color: #475569;
        }

        .neu-card {
            background: #EFF4EF;
            border-radius: 20px;
            box-shadow: 9px 9px 16px #cbd1cb, -9px -9px 16px #ffffff;
        }

        .neu-btn {
            background: #EFF4EF;
            border-radius: 50px;
            box-shadow: 7px 7px 14px #cbd1cb, -7px -7px 14px #ffffff;
            transition: all 0.3s ease;
        }

        .neu-btn:hover {
            transform: translateY(-2px);
            box-shadow: 10px 10px 20px #cbd1cb, -10px -10px 20px #ffffff;
        }

        .neu-btn:active {
            transform: translateY(0);
            box-shadow: inset 4px 4px 8px #cbd1cb, -4px -4px 8px #ffffff;
        }
    </style>
</head>

<body class="antialiased overflow-x-hidden min-h-screen flex flex-col items-center justify-center relative p-6">

    <!-- Background Decoration -->
    <div class="absolute top-20 right-10 w-32 h-32 rounded-full shadow-neu-flat opacity-40 animate-pulse"></div>
    <div class="absolute bottom-20 left-10 w-24 h-24 rounded-full shadow-neu-flat opacity-30 animate-bounce"
        style="animation-duration: 3s;"></div>

    <!-- Main Content Card -->
    <div class="neu-card p-10 md:p-16 max-w-2xl w-full text-center relative z-10">
        <!-- Animated Icon -->
        <div
            class="w-24 h-24 mx-auto rounded-full shadow-neu-pressed flex items-center justify-center text-sage-600 mb-8">
            <i data-lucide="loader-2" class="w-12 h-12 animate-spin"></i>
        </div>

        <!-- Headline -->
        <h1 class="text-3xl md:text-5xl font-bold text-primary-600 mb-6">Plantilla de Inversiones</h1>

        <!-- Description -->
        <p class="text-lg md:text-xl text-primary-500 mb-10 leading-relaxed">
            Estamos trabajando y creando algo increíble para ti. <br>
            <span class="text-sage-600 font-bold mt-2 block">Próximamente lanzaremos.</span>
        </p>

        <!-- CTA -->
        <a href="index.html" class="neu-btn px-8 py-3.5 text-sage-600 font-bold inline-flex items-center gap-2 group">
            <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
            Volver al Inicio
        </a>
    </div>

    <!-- Footer -->
    <footer class="absolute bottom-6 text-center text-primary-500 text-sm opacity-60">
        <p>&copy; 2026 Plantillas.</p>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
